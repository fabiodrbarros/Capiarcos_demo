<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capiarcos — Admin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="icon" type="image/png" href="/assets/img/logo.png">
</head>
<body>

  <!-- ════ LOGIN ════ -->
  <div class="login-bg" id="login">
    <form class="login-card" id="login-form" autocomplete="off">
      <img class="login-logo" src="/assets/img/logo.png" alt="Capiarcos">
      <h1 class="login-h">Plataforma de gestão</h1>
      <p class="login-sub">Catálogo de imagens · Capiarcos</p>
      <label class="login-lbl">Password</label>
      <input type="password" id="pw" required autofocus>
      <button type="submit" class="login-btn">Entrar</button>
      <p class="login-err" id="login-err"></p>
      <a href="/" class="login-back">← Voltar ao site</a>
    </form>
  </div>

  <!-- ════ APP ════ -->
  <div class="app" id="app" hidden>

    <!-- TOP BAR -->
    <header class="bar">
      <a href="/admin/" class="bar-brand">
        <img src="/assets/img/logo.png" alt="">
        <div>
          <strong>Capiarcos</strong>
          <span>Admin · Catálogo</span>
        </div>
      </a>
      <div class="bar-actions">
        <a href="/catalogo.html" target="_blank" rel="noopener" class="bar-link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M10 2h4v4M14 2 8 8M7 3H3v10h10V9"/></svg>
          Ver site
        </a>
        <button id="logout" class="bar-link">Sair</button>
      </div>
    </header>

    <!-- MAIN -->
    <main class="layout">

      <!-- SIDEBAR -->
      <nav class="side">
        <div class="side-head">Categorias</div>
        <div class="side-list" id="side-list"></div>
        <div class="side-foot">
          <small>Total: <strong id="total-count">0</strong> imagens</small>
        </div>
      </nav>

      <!-- PANE -->
      <section class="pane">
        <div class="pane-head">
          <div>
            <div class="pane-tag">Categoria selecionada</div>
            <h2 class="pane-title" id="pane-title">—</h2>
          </div>
          <span class="pane-count" id="pane-count">0 imagens</span>
        </div>

        <!-- DROPZONE -->
        <div class="dz" id="dz">
          <input type="file" id="files" hidden multiple accept="image/*">
          <div class="dz-cta">
            <svg class="dz-ico" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
              <path d="M18 4v22M9 13l9-9 9 9M4 30h28"/>
            </svg>
            <div>
              <strong>Arrasta imagens para aqui</strong>
              <span>ou <em>clica</em> para escolher do computador</span>
            </div>
          </div>
          <div class="dz-prog" id="dz-prog" hidden>
            <div class="dz-bar"><div id="dz-fill"></div></div>
            <div class="dz-lbl" id="dz-lbl">A carregar…</div>
          </div>
        </div>

        <!-- GRID -->
        <div class="grid" id="grid"></div>
      </section>
    </main>

    <!-- TOAST -->
    <div class="toast" id="toast" hidden></div>
  </div>

  <script src="/assets/js/admin.js"></script>
</body>
</html>
